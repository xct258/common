# 备份脚本配置（shell 脚本格式，可直接 source）
# 请根据实际情况修改这些变量。

# 调度相关
schedule_sleep_time="00:00"
backup_logs="/mnt/ssd-1/日志/备份脚本"  # 日志文件存放目录
backup_dir="/root/apps/脚本/备份/备份脚本"  # 备份脚本所在目录，通常是当前脚本所在目录
backup_file_sh=(
    "重要目录备份"
)  # 需要执行的备份脚本列表，脚本名称不带扩展名

# 需要备份的源目录列表
backup_directories=(
    "/mnt/ssd-1/xct258/docker"
    "/mnt/ssd-1/xct258/图片"
)

# 备份目标目录列表
backup_dirs=(
    "/mnt/hdd-1/重要备份"
)

# 特定的备份目录，用于存档备份文件
backup_dir_folder="/mnt/backup-1/重要备份"

# 每月第几天进行存档备份
backup_dir_folder_time="1"

# 临时备份文件存放目录
backup_cache_dir="/mnt/ssd-1/重要备份临时文件"

# INI 文件路径，用于服务监控
ini_file="/mnt/ssd-1/docker/server-monitoring/配置文件/TrueNAS.ini"  # 请根据实际情况修改路径
