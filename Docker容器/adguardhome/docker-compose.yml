services:
  adg-1:
    image: adguard/adguardhome:latest
    container_name: adg-1
    restart: always
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "127.0.0.1:3001:3000/tcp"
    volumes:
      - /home/xct258/docker/adg-1/work:/opt/adguardhome/work
      - /home/xct258/docker/adg-1/conf:/opt/adguardhome/conf

  adg-2:
    image: adguard/adguardhome:latest
    container_name: adg-2
    restart: always
    ports:
      - "54:53/tcp"
      - "54:53/udp"
      - "127.0.0.1:3002:3000/tcp"
    volumes:
      - /home/xct258/docker/adg-2/work:/opt/adguardhome/work
      - /home/xct258/docker/adg-2/conf:/opt/adguardhome/conf
